body:
  text: 黃素三盟登壇儀某國號某年太歲某某月朔日子某時係天師某治氣太一道士三洞法師五嶽遊行先生某郡某縣某鄉某里真人男官某昔從三洞法師太一道士男官某受老君元義天地日月五星上三天真一太一普督五億五萬五千五百五十五億萬重諸天諸日月星辰諸仙府諸世間諸地山嶽天神地祇五嶽四瀆三河九江四海八極山神水靈千鬼萬靈一切皆屬上三天真一太一今謹以某歲月朔日子某時傳付某郡縣鄉里真人某甲年如干歲稟氣清淳好道樂生隂陽中和五氣治身先受黃圖契令真天赤籙真天三一真一太一素劵從來積年未能飛仙今求進受上三天真一太一三十二天帝位符信受持金剛分真形投金魚稱與諸天地水三官結盟對共分金破契刻臂吸血飲丹結髮身命為誓與某甲共為一身同心合契奉行天真修行神仙志同齊舉飛升上天不得耽染色欲不專正一一旦受道之後三十六年遇賢聽傳可授之人不得妄傳不得自欲髙位不崇根本背向異辭二心兩舌誹謗師道攻伐師主一旦違負契令身謝三官長為下鬼削除生名不得怨恨甲自好樂神仙時不拘迫手共畫一為信右太一真盟上契左右書之國號某年太歲某月朔日子某時某郡縣鄉里男女官太一道士真人某甲年如干歲詣臣某度受太一登壇盟約真一口訣結盟拔度生死不得負違一如老君律令右太一中盟契係天師某治氣五嶽遊行先生臣姓某乙以去某年太歲某月某日某時從三洞法師陽平治功平五氣左平氣某嶽先生真人姓某乙受太一真契三盟之法拔度生死上遷九幽之中七祖名籍下度已身三男之庭保成上仙太一同轅太一道士某郡縣鄉里男女生某乙於某郡縣鄉里中結盟奉受拔髮結髮生死為誓不負太一帝君神仙大盟律令五帝魔王過度太一道士甲生死三界名上仙品右太一下盟左右書之夫受三盟者應須五人七人九人同共結盟減此不合法也上拔度百曽之罪下過度三界宫真妙之事極於三盟生死成仙無有差違受者結人為盟未至五日逆上盟剌條郡縣治位告下二十四獄拔出甲等七祖父母遷逹沐浴竟五日然後而授此祕之師口萬金不傳傳之後賢非賢勿泄某郡縣鄉里男女官某甲年如干歲右如干人先受黃圖赤籙三一真一太一一言之訣從來積年未能幽究宿緣今齎信詣臣求受太一真一契三盟都劵請授謹狀係天師某治氣某嶽先生臣姓某乙上言謹按文書臣以人微肌腥骨臰謬蒙明時師老布化之際過泰負荷教化無效宣勸逋替夙夜戰栗如履冰谷有男女官太一道士某甲等如干人年如于歲先受訣言未受太一三盟祕法今各齎法信詣臣乞結盟元元丹赤感於神明求乞之至微於影像臣輒受法信教以訣言道重人輕不敢便授共登黃壇授以盟言要誓天地日月為盟刻臂飲丹誓告神明不敢妄傳甲受盟之後不得輕傳泄露真要自當奉承師法皆如今約一旦負違今誓甲當以身謝天地水三官萬殁之後不敢有怨乞原甲未受訣之前所犯一切赦貸恩惟太上太一帝君慈父聖毋則蒙省理右操臣度太一登壇三盟付授訣言黃素中章某郡縣鄉里男官某甲年如干歲等乞恩辭某素以胎生肉人千載有幸得在道門户屬師主某甲治以係天命昔蒙明時得參中祕黃圖赤籙三一真一太一回車畢劵之訣從積年而善功未立譴闕非一夙夜憂懼若履冰谷雖復導生養氣蒙恩無他未得奉修九誡百二十事仰謝三十二天請度宿命之法無上三天真一太一登壇大盟實所未聞不惟六蔽知進忘退謹齎法物三十二種奉橾詣治乞丐成就如蒙教授不敢泄露攻根伐本負違契令某等以身謝天地水三官殁命敢恨謹辭太歲云云某郡縣鄉里男女官某甲等謹條法信如左生米一斛緋繒六十四尺柳薪一束筆一雙鐵二百五十斤墨一丸玄繒二百五十尺書刀一口黃金十二兩大席一領黃素二百四十尺真珠一兩法巾一枚褐一領金環一雙法案五枚明鏡一面盛戒五綵法囊一枚法信盟錢三萬二千盛經集文錦囊一枚命絲三十二兩清淨罌盤七各一枚青銅劒一枚和香五奩生口男女替代各一人明光錦百二十尺銅八十斤青繒八十一尺生硃砂六十四兩白銀十二兩大紙一百張白絹三百六十匹右三十二種奉操詣治受登壇三盟上言謹按文書臣以人微忝佩太一尊任搜授賢能應補仙品者有牒男女官某乙等稟氣清淳好道樂生今奉受五氣隂陽治身錬氣積年材堪進補上三天真一太一極品上統五億五萬五千五百五十五億諸天諸日諸月諸星宿諸仙府諸仙聖諸仙闕諸山嶽天神地祇五嶽四瀆三河九江四海八極九宫八卦神室山神水靈一切千鬼萬神普攝衆神三萬六千普統衆靈總御衆官侍從衆仙及家國三魂七魄三鬼五神千二百形影萬二千精光一時並來更仙練某等今一旦受上三天真一太一之後不得背違上三天盟誓攻伐師主輕泄妄傳必須擇賢三十三年一傳不得違約違約之日某等身神沈翳長為下鬼命為土塵削除仙名不得厠預仙品長殁三官考召君吏所考事立所召者詣肉人元元須待拜署謹為拜章一通上詣上三天無上太上一君太上上三天太上上帝君上三天太上元君三天太元一君上三天大道萬道根宗天地本始上至無上下洞無窮逺至無邊無極幽微衆官萬靈上三天之上五億五萬五千五百五十五億諸天君將吏功曹使者謁者僕射書佐小吏將軍吏兵馬騎乘各從官五億五萬五千五百五十五億萬衆一合從上上上無上上三天之上蓋天來下入甲等身中從頭至足布匝骨節五藏六府九宫十二神室四肢五體百八十關機三百六十骨節孔竅營衛筋骨血脈安某等三魂定某等七魄仙某等三魂正五神生五藏應五星召還三萬六千餘神署生官各安宫室使仙道畢成舉形飛升上為真人更定仙壽萬八千歲願上三天太一天尊萬道之主萬神之宗將從天仙鎮某等身中檢録萬神願上三天之上飛仙君將神仙君將度世君將神人君將真人君將元陽君將萬生君將萬氣君將導仙君將胎息君將元精君將延壽君將太極君將太一君將清微天禹餘天大赤天君將吏兵馬騎乘一合來下入某身中營生養性還年補䐉行生布氣金丹神漿玉液入某等身神玉女侍衛左右九天丞相削除死籍上名三天生録與天地無窮周旋天下六合載名山嶽出入人間延年益壽辟斥五兵水火災厄縣官口舌疾病喪禍虎狼猛獸毒蟲𡨚家盜賊伏匿黃淵埋頭萬丈不得妄宣若有符師道士支散雜靈六天故氣飲食鬼神一切迸匿登山履嶮萬神扶將周旋天下地上神明交降所在立驗仙道必成胎息服御導引神氣內外光明雲行身中上升清天黃老立宥神仙結友交遊真人飛騰高舉上補天仙乘雲駕龍拜謁道君壽終不老與日月齊明飛行超越隱顯浮輪并遷某家七世父毋上至億曾萬祖皆升三天列補仙官恩惟太上無極太一君垂恩省納分别求哀右破三盟契後付授赤章太一黃素三盟儀謹啓黃素丹盟告諸弟子某甲等應諾太清太一無量清法門下真一五氣太一九宫成具滿足便得仙度太上於昆崘進登天首大治七寶觀上召天師張道陵而告之曰吾道出於無先太初之前無所從生靡所不成吾昔於此觀上啓受妙法吾以聰明智慧攝意奉行便得微妙玄通求道上仙莫有踈怠之名奉行黃老之道生死之訣當畏法愼戒生門之中生道有一死道有九驗於大度常當戰戰如履冰劒把毒常懼害及其身謙謙曲躬畢辭下物勤心苦行無虧孝敬受設之後奉行法戒無違分數九一之法生道之極耶天師再拜承盟奉修位登天師後授王長趙升三夫人洛下三公皆得白日升天登壇如左謹請盟誓列啓三官甲等受盟誓天地為信指日月為盟引三曽五祖七世父毋自身證約不輕傳泄登壇之設九年聽傳三人若世無可傳者啓宣三官發先盟書封諸事設藏之深山石室不違盟約甲等七祖父母上升玄宫受福天官身得仙度福流萬世世蒙榮寵若妄傳非其人甲等七祖父母下受風刀之考身沒積夜之河殃流萬世世世受考吸血飲丹披靈赤心啓封三官日月所照天地所聞結盟之後司命削某等死籍度著生籙使天官注仙名地官除死籍水官絶殃考壇上三官考召君吏并甲等所佩將軍吏兵保護肉人必使仙度若甲等先世因緣宿對未應即仙要須尸解暫經太隂者甲等以得登壇大度結盟三官罪滅福生應升神室福堂二十四神自守衛申等形骸不使魂魄離散骨肉臰腐二十四年舉形化出宿緣應死超然復生枯腐之骸枯骨受仙沈淪隱見無所拘閉此是登壇結盟三官之力超登殊劫過死度生之福明自修愼不敢違負今約謹宣盟約告諸弟子同壇共視師某父毋若有厄難當衆共濟若橫罹縲紲當審明極窮濟之趣急度疾厄不得輕師負盟親相捐棄若如此而不救告而不赴者有厄之身發盟告神求乞免度違盟者受考告靈者得福若在厄難之中不測之地向師存亡所在靜夜披露丹心啓求度脫若未蒙濟免自當神告景應知其罪福盟誓君吏壇上三官自應侍衛營護必得無他但當敬承盟約不違信誓自得仙度衛護君吏考功記過壇上三官主償罪福明白證愼某國號太歲某月朔曰於某州郡縣鄉里中係夭師某治氣臣某甲從某治道士某奉受傳某郡縣鄉里某甲太上黃素丹盟三條登壇者各朱書黃素佩隨身生則受仙之劵死則拔逮之根三官證拔生生受福無復罪緣太一登壇黃素三盟逆剌付授儀東向叩齒二十四通謹出臣身中五體真宫神仙五氣功曹吏出太一金剛元氣直使功曹道神功曹五元功曹和合功曹運氣功曹統仙功曹各二十四人出王氣左官使者平氣右官使者隂陽神決吏仙化吏科車赤符吏剛風騎置驛馬上章吏官各二十四人出某郡縣鄉里中真正之官監察注氣考召四君逮召諸君將吏等左右平氣君左右都候君左右執平君左右執法君東方九天九氣君南方三極三氣君西方七合七氣君北方五元五氣君中央一氣君陽平鹿堂等二十四治氣三十六靜廬天師門下君將吏兵所布下道上二玄三元四始五德六合甲子諸官君周天八極飛仙君養性長生青龍螣蛇君等奉行文書事謹操臣為男女生民太一道士某乙度金剛畢劵或登壇黃素三盟拜露剌一通剌今露在中庭玉案上請省功曹使者將軍吏兵須考正甲等合氣連名保負須所召者詣所下若至功成事立臣拜章報授畢各還臣宫室中伏須效應匍匐當剌右授金剛畢劵上剌出官授太一三盟大劵口剌某郡縣鄉里男女生官某申等年如干歲字某乙戶屬師主某乙治男女官某乙等稟性慈仁素體溫良錬氣積年厠身祕門參染真要階緣上道奉受太一金剛契令曉知三氣飛仙之訣雖備衆契未遂登壇生死大盟今齎信儀連名誓身束骸告臣求受太一三盟登壇大劵明真大諱三百六十圖號千二百口訣依先師本法告傳謹狀具位係天師某治氣臣某甲稽首再拜上啓太上無極大道太上老君太上丈人太一帝君皇天上帝無極元君道德衆尊三天法師正一真人門下典者施行飛仙君吏臣運逢天道係命玄教銜宣法化搜索有道遊行世界拔度天人今有宿命因緣從虛無中來某郡縣鄉里男女官某甲年如千歲甲等素染玄教練備真文奉受衆契修行真祕雖備上法未破玄誓令相攜率操齎法儀束骸詣臣求受太一登壇三盟生死處仙大劵黃素證誓臣昔從大洞真人某奉受約當傳授後賢察甲等專誠樂道在可成就輒剋某月某曰時於某嶽山之中共立黃壇證誓五帝分符破契告盟天地付授祕局施行口訣謹先於此某郡縣鄉里中露白剌奏上天曹特願太一帝君皇上大道留神照察若甲等有骨法合便依法付授玄都無骨法願為考正徙上玉籙名備天仙到某曰某時良曰吉辰靈嶽之中黃壇之上稽首告盟誓天證地付授玄一髙上之道生死大盟存亡成仙謹以啓聞立須報應臣甲誠惶誠恐稽首再拜以聞臣姓太上大道無上三天太一帝君太清玉陛下太歲右口剌謹重勑五體仙官騎乘將吏騰臣所上某剌上詣太上左君玉閣下付與侍香青腰玉女等所言倒錯越失不得舊法者願為考正依本法文若有千截公文者將吏神仙騎乘收付所在獄中依事治罪令臣所啓上達伏須告報臣所上事訖向出仙官吏兵各還宫室彌綸五宫六府安官復職至曰呼召復出鳴鼓十三通三咽氣畢太一三盟付授儀東向叩齒二十四通謹出臣身中神仙直使正一神官功曹隂陽運氣明光使者左右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏飛龍騎吏左右龍虎君赤飛仙童官各二十四人出出者嚴裝顯服具列威儀謹關某郡縣鄉里中真官注氣監察考召四君將吏社里邑君土地靈祇八方監察神仙衆官並備真位係天師太一氣無極金剛畢劵某嶽先生臣某稽首再拜上啓太上無極大道太上老君諸君丈人太一帝君天帝君皇上大道天師三師君太一神仙玉曆真科付授威儀使者典行飛仙事臣萬劫因緣謬聞大法運值有幸遇大洞法師真人某甲授臣登壇大盟生死證誓飛升至道玄元要訣衆真之劵萬幸宿生悟性臣受法以來積有年載雖未能察幽覩冥坐在立亡重希玄降於身有科承科傳授以付後賢某郡縣鄉里某甲年如干歲前蒙黃籙契令奉受五金剛契令被氣積年練悉紀綱今操齎信儀詣臣求受登壇三盟大訣目承先師本法與甲等對共立壇證誓五帝分金破劵吸丹告盟甲等受道之後永為身寶不得攻根伐本指師謗道唱露要訣傳非其人中泄靈文施布世間一旦有違生死父毋沈淪罪由萬劫無原謹以啓聞須可奉行臣申誠惶誠恐稽首再拜次讀劵讀黃盟次畫一畫一左手指天右手畫地以左手指中央師便言係天師某治陳昔從大洞弟子某受太一登壇盟劵今依法傳授弟子某甲受此證約當依真師盟壇大約不得攻根伐本指師謗道泄露靈盟一旦有違萬殁謝罪生死沈淪上告天靈下示地祇中誓賢人三證靈盟義不相負謹共畫一為信次下髮作結一結言清微天泓二結言禹餘天澄三結言大赤天明上三天之帝真重為誓結髮盟壇不負靈約次刻鐶言玄老大一䦝刻中言大上太一門石門也次弟子盟丹水某郡縣鄉里男女生太一道士某甲敢告丹水申好仙樂聖詣太一無極道士某甲受太一三盟登壇大劵明真大諱三百六十圖號千二百口訣甲為弟子不得背叛師道妄傳世人違盟族傾背誓不生共吸丹水為盟指天畫地以生神靈急急如律令次師命丹法太一無極道士姓乙某敢告丹水有某郡縣鄉里某甲求受臣太一三盟登壇大劵明真大諱之訣萬道之神甲為弟子不得背違劵契上監三天老君所明急急如律令次師左手弟子右手共持丹水更吸之各三止弟子先吸師後吸醮壇法用醮具五盤香五爐用棗五柈東向祭五帝醮具九盤香九爐用棗九柈東向祭太一九君係天師太一無極某治真人臣甲謹上詣東方青帝南方赤帝西方白帝北方黑帝中央黃帝太一帝君皇天大道太清五陛下從官九億萬騎搖天動地降此靈嶽皇壇之上臨饗微醮屈靈暫臨謹有男女官某乙等受黃素太盟長生拔仙大劵施設微心上請天尊伏願神顔曲眄世界眷慜蒼生愆闕不及以唯乞願原赦使再拜次受契者先五拜次師左手授契與弟子弟子左手取之三繞身畢東向三回九拜次又北向九拜太一君三回三拜又向師九拜次俱起於地户指天畫地左行三回右轉召弟子七祖證明如具次重勑法謹出臣身中五體真官功曹吏出太一金剛長壽功曹二百四十人太一度世功曹二百四十人太一度命功曹二百四十人出太一青腰玉女二百四十人出太一娥皇玉女二百四十人出五老君將吏二百四十人出長生永終吏二百四十人出東九夷南八蠻西六戎北五狄中央三秦君將吏各二百四十人出千乘億騎蓋天來下剛風騎置驛馬上章吏官各二百四十人出今授甲等太一三盟登壇大劵明真大諱之訣或金剛一言之訣當令甲等受道之後長生久視同襟仙聖齊肩保器神耀不求而前祐令神丹金液靈芝衆藥服練身形千道萬神為甲驅使坐起行住太陽在左太隂在右青龍白虎朱雀玄武俠從前後天神當下地神並出五老神君除甲死籍青書黃簡上甲生名七玄父毋返胎南宫合家大小皆享永延甲一旦違盟考甲百曽摙蒙山之石填塞三河長充下鬼永為土囚一如契令依如太上老君太上衆尊無極大道無上玄老五氣道德萬生萬度萬福君丈人新出老君太清玄元上三天無極大道太上老君太上丈人太上三氣君天帝君太上五氣律令泰玄都正一平氣係天師某治太一道士太上曽孫小兆臣甲稽首再拜上言謹按文書臣等素自蟲蟻枯骨子孫千載有幸得在道門被蒙大恩不以頑愚竊好生法並蒙師老賜佩太一契令不唯功少希慕上真以今月某日率同學某甲等詣無極太一中宫道士某治郡縣鄉里某乙進受無上太一證誓三天登壇死生三盟上拔七世父母幽魂苦爽次以升度某乙等生死之愆腐骨臰肉未有微勤荷施山嶽非臣甲等輕愚所享不勝重沓謹伏地拜章謝聞願上官典者哀矜臣等乞上生名太清仙都玉曆得在神仙種民輩中謹遣臣等身中三官考召君將吏天官考地官考水官考清微天考禹餘天考大赤天考此里中四面真官注氣監察考召諸官將吏臣等投身託命生氣一節奉承元老臣等所備宜畢真妙中玄皇壇山岑之上太陽之下伏地拜赤中章一通上奏至極太一几前臣等從臣某乙共上告皇靈下指地祇冒黷以傳受恩惟玄極映明真君蠲明注氣謹請無極自然神仙先天帝太元君姓字率將騎乘日月五星五帝九宫五嶽四海璇璣玉衡三河九江神仙兵馬太一騎乘獨轅之車駕無極之馬前導至真精神後從五帝陛下神仙騎乘俠從左右前無不祥後無殃咎頭上璇璣足步北斗日月五星導前從後震天動地一合來下各按次第左右從臣某乙等三元會宫中一為神主仙帝之皇當為臣等延上三天生氣太一神丹金液玉漿入臣等身中八十一宫十二神室太玄四注臣等五神太一神精五氣纓珞九元練命三丹度生却死升上晨極注入玄宫翺翔五嶽髙舉飄騰耀影金闕鳯舉紫庭仙道早成毛羽時生遨遊八表戲玩八臺交關華霍賜與丹精九靈合華七祖升遷魂入道鄉間樂之堂衣食自然臣等同盟之人有厄之日當更相救濟拔度為先上存法師次存同盟人名自今以後不敢負三盟約言宗崇法師唯善為先既往之罪負盟之愆唯乞原赦恩惟太上無極大道無上玄老太上三氣天帝君分别求哀臣等謹因二官直使正一功曹上右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏官各二人出操臣等受太一三盟拜上三日謝恩紙章一通上詣天曹伏須告報臣甲誠惶誠恐稽首再拜右三曰謝恩章四極明科開度文訣葛仙公撰夫受靈寶三十六部尊經不受回案即萬劫之中不得傳受既受回案不破太一登壇三盟金真妙契則七玄不離於酆都那可便為人師三盟既竟即七玄超度生死同仙便拜回案授為洞玄法師若七祖未拔三盟不破輕授回案則師受泄經之罪賤寶之愆依四極明科荷風刀之考依三盟解釋則存亡超拔標名諸天故拜為靈寶法師夫受靈寶開度不顯於師則死籍不解瓊文無名徒受寶經永無傳付閉塞大法於身為損受經既竟便為開度上顯諸天下標諸地名徹諸真為師上盟五帝為洞玄師若無此之功師輕度回案師則受輕泄違誤之罪身受風刀萬劫無原後世為明識此言勿作輕説考及汝身沈淪罪網萬劫無原考屬四極曹有急厄災疾呼太一名以左手執道父便仰頭三呼無極太一君諱我今有某急厄君當過我湯火之中白刃之下過度九厄之中知道為神知道為真左回還兩顧子狩士徐名他二名上鼠頭人身黑衣持鑲丑狩士秦何牛頭人身黑衣持鑲寅狩士徐方虎頭人身青衣持鍈卯狩士徐澤兔頭人身青衣持鍈辰狩士徐皇龍頭人身青衣持鍈已狩士徐千蛇頭人身赤衣持戟午狩士司馬籍馬頭人身赤衣持戟未狩士公孫昔羊頭人身赤衣持戟申狩士石勝猴頭人身白衣持弩酉狩士石衰雞頭人身白衣持弩戌狩士徐阿狗頭人身白衣持弩亥狩士公孫昔豬頭人身黑衣持鑲右十二時狩士真名服符存呼之不得傳非其人祕之愼之戴先生授謝頴川謝頴川授道士陳藝道士陳藝授毋仲度度授劉散騎道符符授道士丁玄真九和香法燒之香聞九里感徹神明沉木香一斤青木香三兩甲香三兩薰陸香一斤詹唐香三兩燮香一斤青漸香一斤雀頭香一斤大乾棗二十枚凡九種各異搗下篩以白蜜和令相著密器中封其口三宿三日香成聞九里其法祕不妄傳欲致神明合諸丹者燒之稍稍分著别器中令氣不泄此古九和也正一法文法籙部儀
